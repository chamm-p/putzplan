<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0b0f1a"/>
      <stop offset="100%" stop-color="#1a2030"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#14b8a6"/>
      <stop offset="100%" stop-color="#5eead4"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>
  <!-- broom handle -->
  <rect x="290" y="90" width="22" height="240" rx="11" fill="url(#accent)" transform="rotate(20 301 210)"/>
  <!-- broom head (stylized fan) -->
  <g transform="translate(180 360) rotate(20)">
    <rect x="-90" y="0" width="180" height="36" rx="10" fill="url(#accent)"/>
    <g stroke="url(#accent)" stroke-width="8" stroke-linecap="round" opacity="0.85">
      <line x1="-70" y1="40" x2="-100" y2="110"/>
      <line x1="-35" y1="40" x2="-50" y2="116"/>
      <line x1="0" y1="40" x2="0" y2="120"/>
      <line x1="35" y1="40" x2="50" y2="116"/>
      <line x1="70" y1="40" x2="100" y2="110"/>
    </g>
  </g>
  <!-- sparkles -->
  <g fill="#5eead4">
    <circle cx="120" cy="140" r="6"/>
    <circle cx="400" cy="170" r="8"/>
    <circle cx="380" cy="380" r="5"/>
  </g>
</svg>
